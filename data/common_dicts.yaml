# 公共金融枚举字典池
# 用法：在 YAML 模板中通过 ${choice(dicts.id_types)} 引用

id_types:
  - "01"   # 居民身份证
  - "02"   # 护照
  - "03"   # 军官证
  - "04"   # 港澳通行证
  - "05"   # 台湾通行证

gender_codes:
  - "M"
  - "F"

nationality_codes:
  - "CN"
  - "US"
  - "HK"
  - "MO"
  - "TW"

account_types:
  - "01"   # 个人账户
  - "02"   # 企业账户
  - "03"   # 机构账户

account_status:
  PENDING: "待开户"
  ACTIVE: "正常"
  FROZEN: "冻结"
  CANCELLED: "注销"

currency_codes:
  - "CNY"
  - "USD"
  - "EUR"
  - "HKD"

product_types:
  - "FIXED_DEPOSIT"     # 定期存款
  - "DEMAND_DEPOSIT"    # 活期存款
  - "FUND"              # 基金
  - "BOND"              # 债券

channel_codes:
  - "APP"
  - "WEB"
  - "COUNTER"
  - "API"

risk_levels:
  - "R1"   # 低风险
  - "R2"   # 中低风险
  - "R3"   # 中风险
  - "R4"   # 中高风险
  - "R5"   # 高风险
