# 新增通知公告 YAML 模板
# 接口: POST /dev-api/system/notice
# 权限标识: system:notice:add
# 枚举: noticeType 1 通知 / 2 公告；status 0 正常 / 1 关闭

api_info:
  path: "/system/notice"
  method: "POST"
  description: "新增通知公告"

logic_rules: []

payload:
  noticeTitle: "自动化公告_${rand_str(en, 8)}"
  noticeType: "1"
  noticeContent: "${rand_str(chn, 6)}公告正文"
  status: "0"
  remark: "${rand_str(chn, 4)}备注"
