# 新增岗位接口 YAML 模板
# 接口: POST /dev-api/system/post
# 权限标识: system:post:add
# 文档: 需携带 Bearer Token；postCode/postName/postSort/status 为必填
# 枚举: status 0 正常/1 停用

api_info:
  path: "/system/post"
  method: "POST"
  description: "新增岗位"

logic_rules: []

payload:
  # === 必填字段 ===
  postCode: "test_${rand_str(en, 6)}"
  postName: "${rand_str(chn, 3)}岗位"
  postSort: 10
  status: "0"

  # === 可选字段 ===
  remark: "${rand_str(chn, 4)}测试备注"
