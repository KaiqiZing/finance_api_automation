# 修改岗位接口 YAML 模板
# 接口: PUT /dev-api/system/post
# 权限标识: system:post:edit
# 文档: 需携带 Bearer Token；postId/postCode/postName/postSort/status 为必填
# 注意: postId 必须由用例层通过 overrides 注入，此处仅占位
# 枚举: status 0 正常/1 停用

api_info:
  path: "/system/post"
  method: "PUT"
  description: "修改岗位"

logic_rules: []

payload:
  # postId/postCode/postName/postSort/status 必须由用例层通过 overrides 注入，此处仅占位
  postId: 0
  postCode: ""
  postName: ""
  postSort: 10
  status: "0"

  # === 可选字段 ===
  remark: "${rand_str(chn, 4)}修改备注"
