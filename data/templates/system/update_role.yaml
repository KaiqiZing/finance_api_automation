# 修改角色接口 YAML 模板
# 接口: PUT /dev-api/system/role
# 权限标识: system:role:edit
# 文档: 需携带 Bearer Token；roleId/roleName/roleKey/roleSort/status 为必填
# 注意: roleId 必须由用例层通过 overrides 注入，此处仅占位
# 枚举: status 0 正常/1 停用
# 枚举: dataScope 1 全部/2 自定义/3 本部门/4 本部门及以下/5 仅本人

api_info:
  path: "/system/role"
  method: "PUT"
  description: "修改角色"

logic_rules: []

payload:
  # roleId/roleName/roleKey/roleSort/status 必须由用例层通过 overrides 注入，此处仅占位
  roleId: 0
  roleName: ""
  roleKey: ""
  roleSort: 10
  status: "0"

  # === 可选字段（含文档默认值）===
  dataScope: "1"
  menuCheckStrictly: true
  deptCheckStrictly: true
  menuIds: []
  remark: "${rand_str(chn, 4)}修改备注"
