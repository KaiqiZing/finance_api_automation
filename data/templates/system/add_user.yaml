# 新增用户接口 YAML 模板
# 接口: POST /dev-api/system/user
# 文档: 需携带 Bearer Token；userName/nickName/password 为必填
# 枚举: sex 0 男/1 女/2 未知，status 0 正常/1 停用
# 部门: 103 研发 / 104 市场 / 105 测试 / 106 财务 / 107 运维
# 岗位: 1 董事长 / 2 项目经理 / 3 人力资源 / 4 普通员工

api_info:
  path: "/system/user"
  method: "POST"
  description: "新增系统用户"

logic_rules: []

payload:
  # === 必填字段 ===
  userName: "${rand_str(en, 6)}"
  nickName: "${rand_str(chn, 3)}"
  password: "Test@123456"

  # === 可选字段 ===
  phonenumber: "${get_mobile}"
  email: "${rand_str(en, 8)}@test.com"
  sex: "${choice(['0', '1', '2'])}"
  status: "0"
  deptId: "${choice([103, 104, 105, 106, 107])}"
  roleIds:
    - 2
  postIds:
    - 4
  remark: "${rand_str(chn, 5)}测试备注"
