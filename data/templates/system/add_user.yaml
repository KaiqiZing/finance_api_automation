# 新增用户接口 YAML 模板
# 接口: POST /dev-api/system/user
# 文档: 需携带 Bearer Token；userName/nickName/password 为必填
# 枚举: sex 0 男/1 女/2 未知，status 0 正常/1 停用
# 部门: deptId 须由用例通过 add_user(dept_id=...) 覆盖，
#       值来自 sys_dept 三级叶子节点（通过 fetch_random_third_level_dept_id 查询）
# 角色: roleIds 须由用例通过 add_user(role_ids=[...]) 覆盖，
#       值来自 sys_role.role_id（通过 fetch_one_role_id 查询）
# 岗位: postIds 须由用例通过 add_user(post_ids=[...]) 覆盖，
#       值来自 sys_post.post_id（通过 fetch_one_post_id 查询）

api_info:
  path: "/system/user"
  method: "POST"
  description: "新增系统用户"

logic_rules: []

payload:
  # === 必填字段 ===
  userName: "${rand_str(en, 6)}"
  nickName: "${rand_str(chn, 3)}"
  password: "Test@123456"

  # === 可选字段 ===
  phonenumber: "${get_mobile}"
  email: "${rand_str(en, 8)}@test.com"
  sex: "${choice(['0', '1', '2'])}"
  status: "0"
  # deptId / roleIds / postIds 须由用例层查库后通过 overrides 注入，此处占位
  deptId: 0
  roleIds:
    - 0
  postIds:
    - 0
  remark: "${rand_str(chn, 5)}测试备注"
