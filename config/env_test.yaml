# 测试环境配置
env: test

api:
  base_url: "http://192.168.0.107/"
  timeout: 30
  max_retries: 3
  verify_ssl: false
  extra_headers:
    X-Env: "test"
    X-App-Id: "finance_auto"

auth:
  login_url: "/dev-api/auth/login"
  default_user: "admin"
  default_password: "admin123"

# 系统管理服务（RuoYi 后端）
system_api:
  base_url: "http://192.168.0.107/dev-api"
  timeout: 15
  verify_ssl: false
  default_user: "admin"
  default_password: "admin123"

databases:
  default:
    host: "test-mysql.internal"
    port: 3306
    user: "test_user"
    password: "test_password"
    database: "finance_core"
    charset: "utf8mb4"
  dict_db:
    host: "test-mysql.internal"
    port: 3306
    user: "test_user"
    password: "test_password"
    database: "finance_dict"
    charset: "utf8mb4"
  ry_cloud:
    host: "192.168.0.107"
    port: 3306
    user: "root"
    password: "123456"
    database: "ry-cloud"
    charset: "utf8mb4"

poller:
  timeout: 60
  interval: 3.0

allure:
  epic: "金融系统接口自动化"
  env_name: "测试环境(TEST)"

logging:
  mongo:
    enabled: true
    uri: "mongodb://192.168.0.107:27018"
    db_name: "finance_auto_logs"
    collection_name: "api_logs"
    batch_size: 20
    flush_interval_sec: 2
    queue_maxsize: 500
    max_pool_size: 20
  sensitive_keys:
    - password
    - passwd
    - pwd
    - token
    - access_token
    - refresh_token
    - authorization
    - secret
    - private_key
    - card_no
    - id_card
    - phone
    - mobile
    - id_number
  ttl_days: 0        # 0 表示不启用 TTL 索引
  fallback_dir: "outputs/api_logs"
