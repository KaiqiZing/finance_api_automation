[pytest]
pythonpath = .
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts =
    -v
    --tb=short
    --alluredir=outputs/allure_results
    --clean-alluredir
    --cov=api
    --cov=business
    --cov=core
    --cov-report=html:outputs/coverage_html
    --cov-report=term-missing

markers =
    smoke: 冒烟测试
    regression: 回归测试
    account: 账户模块
    payment: 支付模块
    scenario: 跨模块场景
    slow: 耗时较长的测试

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file = outputs/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
